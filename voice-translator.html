<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gespräch DE ↔ IT</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { min-height:100vh; background:radial-gradient(ellipse at 70% 10%,#e8d5b0 0%,#F5F0E8 60%,#d4c4a0 100%); font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif; display:flex; flex-direction:column; align-items:center; padding:24px 16px 60px; }
  h1 { font-size:clamp(20px,5vw,30px); font-weight:700; color:#1A1208; letter-spacing:0.04em; text-transform:uppercase; margin-bottom:4px; }
  .subtitle { font-size:13px; color:#8B7355; font-style:italic; letter-spacing:0.08em; margin-bottom:16px; }

  .key-bar { display:flex; align-items:center; gap:10px; margin-bottom:12px; padding:8px 14px; border-radius:10px; border:1px solid #C8B89A; background:rgba(255,255,255,0.4); font-size:13px; font-family:inherit; width:100%; max-width:500px; }
  .key-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .key-dot.ok { background:#2D5016; box-shadow:0 0 6px rgba(45,80,22,0.6); }
  .key-dot.missing { background:#b44; animation:blink 1s infinite; }
  .key-label { color:#5a4228; flex:1; font-size:12px; }
  .key-btn { background:#1A1208; color:#F5F0E8; border:none; border-radius:7px; padding:5px 12px; font-size:12px; cursor:pointer; font-family:inherit; }

  .mode-bar { display:flex; align-items:center; background:#1A1208; border-radius:12px; padding:6px; margin-bottom:24px; box-shadow:0 4px 16px rgba(0,0,0,0.25); }
  .mode-side { display:flex; align-items:center; gap:8px; padding:10px 16px; border-radius:8px; font-size:14px; font-weight:600; color:rgba(255,255,255,0.4); transition:all 0.3s; text-transform:uppercase; }
  .mode-side.active-de { background:#C4622D; color:#fff; }
  .mode-side.active-it { background:#2D5016; color:#fff; }
  .mode-arrow { color:rgba(255,255,255,0.25); font-size:16px; padding:0 4px; }

  .mic-wrap { position:relative; display:flex; align-items:center; justify-content:center; width:150px; height:150px; margin-bottom:14px; }
  .ring { position:absolute; border-radius:50%; pointer-events:none; opacity:0; }
  .ring1 { width:120px; height:120px; border:3px solid #C4622D; }
  .ring2 { width:148px; height:148px; border:2px solid #C4622D; }
  .ring1.it { border-color:#2D5016; } .ring2.it { border-color:#2D5016; }
  .show-ring .ring1 { animation:ringPulse 1.6s ease-out infinite; }
  .show-ring .ring2 { animation:ringPulse 1.6s ease-out 0.5s infinite; }
  .mic-btn { position:relative; z-index:1; width:96px; height:96px; border-radius:50%; border:none; background:#1A1208; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.3s; box-shadow:0 8px 32px rgba(0,0,0,0.4); font-size:38px; }
  .mic-btn:disabled { cursor:default; }
  .mic-btn.de-rec { background:#C4622D; transform:scale(1.06); box-shadow:0 0 0 4px rgba(196,98,45,0.35),0 8px 32px rgba(196,98,45,0.5); }
  .mic-btn.it-rec { background:#2D5016; transform:scale(1.06); box-shadow:0 0 0 4px rgba(45,80,22,0.35),0 8px 32px rgba(45,80,22,0.5); }
  .mic-btn.busy { background:#8B7355; }
  .spinner { width:38px; height:38px; border:3px solid rgba(245,240,232,0.3); border-top-color:#F5F0E8; border-radius:50%; animation:spin 0.8s linear infinite; display:none; }

  .meter-wrap { display:none; align-items:center; gap:8px; width:100%; max-width:280px; margin-bottom:8px; }
  .meter-track { flex:1; height:14px; background:rgba(0,0,0,0.1); border-radius:7px; overflow:hidden; }
  .meter-fill { height:100%; width:0%; border-radius:7px; transition:width 0.05s; }

  .status { font-size:15px; color:#8B7355; font-style:italic; min-height:22px; margin-bottom:6px; text-align:center; max-width:340px; }
  .status.rec-de { font-size:18px; font-style:normal; font-weight:700; color:#C4622D; }
  .status.rec-it { font-size:18px; font-style:normal; font-weight:700; color:#2D5016; }

  .rec-timer { font-size:28px; font-weight:700; color:#C4622D; min-height:36px; text-align:center; margin-bottom:10px; font-family:monospace; letter-spacing:2px; }
  .rec-timer.it { color:#2D5016; }

  .err-box { display:none; width:100%; max-width:500px; margin-bottom:12px; padding:12px 16px; border-radius:10px; background:rgba(180,50,30,0.1); border:1px solid rgba(180,50,30,0.35); color:#7a1a0a; font-size:13px; line-height:1.6; text-align:center; }

  .log { width:100%; max-width:560px; display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  .bubble { max-width:88%; padding:11px 15px; border-radius:14px; font-size:15px; line-height:1.6; animation:fadeIn 0.3s ease-out; }
  .bubble.de { align-self:flex-start; background:rgba(196,98,45,0.1); border:1px solid rgba(196,98,45,0.25); border-bottom-left-radius:4px; }
  .bubble.it { align-self:flex-end; background:rgba(45,80,22,0.09); border:1px solid rgba(45,80,22,0.2); border-bottom-right-radius:4px; color:#1A3A0A; }
  .bubble-label { font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:4px; opacity:0.6; display:flex; align-items:center; gap:5px; }
  .bubble.de .bubble-label { color:#C4622D; } .bubble.it .bubble-label { color:#2D5016; }

  .reset-btn { margin-top:8px; background:transparent; border:1px solid #C8B89A; border-radius:8px; padding:8px 20px; color:#8B7355; cursor:pointer; font-size:14px; font-family:inherit; display:none; }
  .reset-btn.show { display:block; }

  @keyframes ringPulse { 0%{transform:scale(0.85);opacity:0.8} 100%{transform:scale(1.4);opacity:0} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
</style>
</head>
<body>

<h1>Gesprächs&shy;übersetzer</h1>
<p class="subtitle">Deutsch · Italiano — powered by Claude + Whisper</p>

<div class="key-bar">
  <div class="key-dot" id="key-dot"></div>
  <span class="key-label" id="key-label">…</span>
  <button class="key-btn" onclick="changeKey()">🔑 Key ändern</button>
</div>

<div class="mode-bar">
  <div class="mode-side" id="side-de">
    <svg width="22" height="15" viewBox="0 0 22 15" style="border-radius:2px;flex-shrink:0"><rect width="22" height="5" y="0" fill="#000"/><rect width="22" height="5" y="5" fill="#DD0000"/><rect width="22" height="5" y="10" fill="#FFCE00"/></svg>Deutsch
  </div>
  <span class="mode-arrow">⇄</span>
  <div class="mode-side" id="side-it">
    <svg width="22" height="15" viewBox="0 0 22 15" style="border-radius:2px;flex-shrink:0"><rect width="7.3" height="15" x="0" fill="#009246"/><rect width="7.3" height="15" x="7.3" fill="#fff"/><rect width="7.3" height="15" x="14.7" fill="#CE2B37"/></svg>Italiano
  </div>
</div>

<div class="mic-wrap" id="mic-wrap">
  <div class="ring ring1" id="ring1"></div>
  <div class="ring ring2" id="ring2"></div>
  <button class="mic-btn" id="mic-btn" onclick="handleMicClick()">
    <span id="mic-icon">🎙️</span>
    <div id="spinner" class="spinner"></div>
  </button>
</div>

<div class="meter-wrap" id="meter-wrap">
  <span style="font-size:12px;color:#8B7355;white-space:nowrap">🎙️</span>
  <div class="meter-track"><div class="meter-fill" id="meter-fill"></div></div>
</div>

<div class="status" id="status">Deutsch sprechen — Mikrofon tippen</div>
<div class="rec-timer" id="rec-timer"></div>
<div class="err-box" id="err-box"></div>
<div class="log" id="log"></div>
<button class="reset-btn" id="reset-btn" onclick="resetAll()">↺ Neu starten</button>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const WORKER_URL = 'https://blue-lagune-proxy.friesh.workers.dev';

// ── Key ───────────────────────────────────────────────────────────────────────
function updateKeyUI() {
  const key = localStorage.getItem('bl_api_key') || '';
  document.getElementById('key-dot').className = 'key-dot ' + (key.length>10?'ok':'missing');
  document.getElementById('key-label').textContent = key.length>10 ? 'API Key (sk-…'+key.slice(-4)+')' : 'Kein API Key!';
}
function changeKey() {
  const k = prompt('Anthropic API Key:', localStorage.getItem('bl_api_key')||'');
  if (k?.trim()) { localStorage.setItem('bl_api_key', k.trim()); updateKeyUI(); }
}
(function(){ if (!localStorage.getItem('bl_api_key')) { const k=prompt('Anthropic API Key:'); if(k?.trim()) localStorage.setItem('bl_api_key',k.trim()); } updateKeyUI(); })();

// ── State ─────────────────────────────────────────────────────────────────────
let turn  = 'de';
let phase = 'idle'; // idle | recording | processing | speaking
let mediaRecorder = null, audioChunks = [], audioStream = null;
let meterCtx = null, meterStream = null;
let timerInterval = null, recSeconds = 0;

// ── UI ────────────────────────────────────────────────────────────────────────
function setUI(p, t) {
  if (p!==undefined) phase=p;
  if (t!==undefined) turn=t;
  const btn=document.getElementById('mic-btn'), icon=document.getElementById('mic-icon'),
        spin=document.getElementById('spinner'), status=document.getElementById('status'),
        wrap=document.getElementById('mic-wrap');
  document.getElementById('side-de').className='mode-side'+(phase==='recording'&&turn==='de'?' active-de':'');
  document.getElementById('side-it').className='mode-side'+(phase==='recording'&&turn==='it'?' active-it':'');
  wrap.className='mic-wrap'+(phase==='recording'?' show-ring':'');
  document.getElementById('ring1').className='ring ring1'+(turn==='it'?' it':'');
  document.getElementById('ring2').className='ring ring2'+(turn==='it'?' it':'');
  btn.className='mic-btn'+(phase==='recording'?(turn==='de'?' de-rec':' it-rec'):phase==='processing'?' busy':'');
  btn.disabled=(phase==='processing');
  icon.style.display=phase==='processing'?'none':'';
  spin.style.display=phase==='processing'?'block':'none';
  icon.textContent=phase==='recording'?'⏹':phase==='speaking'?'🔊':'🎙️';
  status.className='status'+(phase==='recording'?(turn==='de'?' rec-de':' rec-it'):'');
  if (phase==='idle')              status.textContent=turn==='de'?'Deutsch sprechen — Mikrofon tippen':'Nächste Frage — Mikrofon tippen';
  else if (phase==='recording'&&turn==='de') status.textContent='⏹ Sprechen, dann nochmal tippen!';
  else if (phase==='recording'&&turn==='it') status.textContent='⏹ Parlare, poi toccare!';
  else if (phase==='processing')   status.textContent='Whisper transkribiert + Claude übersetzt…';
  else if (phase==='speaking')     status.textContent='🔊 Wiedergabe…';
  // Timer
  if (phase==='recording') startTimer();
  else stopTimer();
}

function showErr(msg) {
  const b=document.getElementById('err-box'); b.innerHTML=msg; b.style.display='block';
  setTimeout(()=>b.style.display='none', 10000);
}

function startTimer() {
  recSeconds=0; clearInterval(timerInterval);
  const el=document.getElementById('rec-timer');
  el.className='rec-timer'+(turn==='it'?' it':'');
  timerInterval=setInterval(()=>{ recSeconds++; el.textContent='⏱ '+recSeconds+'s'; },1000);
}
function stopTimer() { clearInterval(timerInterval); document.getElementById('rec-timer').textContent=''; }

// ── Mic click ─────────────────────────────────────────────────────────────────
function handleMicClick() {
  if (phase==='processing') return;
  if (phase==='speaking')  { stopSpeaking(); return; }
  if (phase==='recording') { stopRecording(); return; }
  startRecording(turn);
}

// ── MediaRecorder ─────────────────────────────────────────────────────────────
async function startRecording(lang) {
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        sampleRate: 16000,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      }
    });
  } catch(e) { showErr('🚫 Mikrofon: ' + e.message); return; }

  // Meter
  try {
    meterStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    meterCtx = new AudioContext();
    const src = meterCtx.createMediaStreamSource(meterStream);
    const analyser = meterCtx.createAnalyser(); analyser.fftSize=256;
    src.connect(analyser);
    const buf = new Uint8Array(analyser.frequencyBinCount);
    const fill = document.getElementById('meter-fill');
    document.getElementById('meter-wrap').style.display='flex';
    function draw() {
      if (phase!=='recording'){document.getElementById('meter-wrap').style.display='none';return;}
      analyser.getByteFrequencyData(buf);
      const avg=buf.reduce((a,b)=>a+b,0)/buf.length, pct=Math.min(100,avg*3);
      fill.style.width=pct+'%'; fill.style.background=pct>12?'#2D5016':'#C4622D';
      requestAnimationFrame(draw);
    }
    draw();
  } catch(e) {}

  // Pick best format
  const fmt = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4','audio/wav']
    .find(f=>MediaRecorder.isTypeSupported(f)) || '';
  audioChunks = [];
  mediaRecorder = new MediaRecorder(audioStream, fmt?{mimeType:fmt}:{});
  mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
  mediaRecorder.onstop = () => processAudio(lang);
  mediaRecorder.start(100);
  setUI('recording', lang);
}

function stopRecording() {
  if (mediaRecorder?.state !== 'inactive') mediaRecorder.stop();
  audioStream?.getTracks().forEach(t=>t.stop());
  meterStream?.getTracks().forEach(t=>t.stop());
  meterCtx?.close().catch(()=>{});
  setUI('processing');
}

// ── Whisper + Claude ──────────────────────────────────────────────────────────
async function processAudio(lang) {
  const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
  if (blob.size < 8000) { showErr('🔇 Aufnahme zu kurz — bitte 2-3 Sekunden sprechen.'); setUI('idle'); return; }

  const key = localStorage.getItem('bl_api_key') || '';
  const srcLang = lang==='de'?'German':'Italian';
  const tgtLang = lang==='de'?'Italian':'German';

  try {
    // Convert to WAV for Whisper compatibility
    const wavBlob = await convertToWav(blob);

    // Step 1: Whisper Transkription via Worker
    const formData = new FormData();
    formData.append('audio', wavBlob, 'audio.wav');
    formData.append('lang', lang);

    const transcribeRes = await fetch(WORKER_URL + '/transcribe', {
      method: 'POST',
      body: formData,
    });
    const transcribeData = await transcribeRes.json();
    if (transcribeData.error) { showErr('Whisper Fehler: ' + transcribeData.error); setUI('idle'); return; }
    const transcript = (transcribeData.text || '').trim();
    if (!transcript) { showErr('🔇 Keine Sprache erkannt — bitte deutlicher sprechen.'); setUI('idle'); return; }

    // Step 2: Claude Übersetzung
    const transRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5', max_tokens: 1000,
        system: `You are a professional translator. The input is in ${srcLang}. Translate to ${tgtLang}. Return ONLY the translation, nothing else.`,
        messages: [{ role:'user', content: transcript }]
      })
    });
    const transData = await transRes.json();
    if (transData.error) { showErr('Claude Fehler: ' + transData.error.message); setUI('idle'); return; }
    const translation = (transData.content?.find(b=>b.type==='text')?.text || '').trim();

    addBubbles(lang, transcript, translation);
    setUI('idle');

  } catch(e) { showErr('Fehler: ' + e.message); setUI('idle'); }
}

// Convert any audio blob to WAV via Web Audio API
async function convertToWav(blob) {
  try {
    const arrayBuffer = await blob.arrayBuffer();
    const audioCtx = new AudioContext({ sampleRate: 16000 });
    const decoded = await audioCtx.decodeAudioData(arrayBuffer);
    audioCtx.close();

    // Mono, 16kHz, 16-bit PCM WAV
    const samples = decoded.getChannelData(0);
    const pcm = new Int16Array(samples.length);
    for (let i = 0; i < samples.length; i++) {
      pcm[i] = Math.max(-32768, Math.min(32767, samples[i] * 32768));
    }

    const wavBuffer = new ArrayBuffer(44 + pcm.byteLength);
    const view = new DataView(wavBuffer);
    const sr = 16000;
    function w(off, val, len) {
      if (len===4) view.setUint32(off, val, true);
      else if (len===2) view.setUint16(off, val, true);
    }
    // WAV header
    [82,73,70,70].forEach((b,i)=>view.setUint8(i,b));   // RIFF
    w(4, 36 + pcm.byteLength, 4);
    [87,65,86,69].forEach((b,i)=>view.setUint8(8+i,b));  // WAVE
    [102,109,116,32].forEach((b,i)=>view.setUint8(12+i,b)); // fmt
    w(16,16,4); w(20,1,2); w(22,1,2); w(24,sr,4); w(28,sr*2,4); w(32,2,2); w(34,16,2);
    [100,97,116,97].forEach((b,i)=>view.setUint8(36+i,b)); // data
    w(40, pcm.byteLength, 4);
    new Int16Array(wavBuffer, 44).set(pcm);

    return new Blob([wavBuffer], { type: 'audio/wav' });
  } catch(e) {
    // Fallback: return original blob
    return blob;
  }
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function stopSpeaking() { window.speechSynthesis?.cancel(); setUI('idle','de'); }
function afterSpeaking(fromLang) {
  if (fromLang==='de') { setUI('idle','it'); setTimeout(()=>startRecording('it'), 700); }
  else setUI('idle','de');
}

// ── Bubbles ───────────────────────────────────────────────────────────────────
const FLAG = {
  de:'<svg width="16" height="11" viewBox="0 0 16 11" style="border-radius:1px"><rect width="16" height="3.7" y="0" fill="#000"/><rect width="16" height="3.7" y="3.7" fill="#DD0000"/><rect width="16" height="3.7" y="7.3" fill="#FFCE00"/></svg>',
  it:'<svg width="16" height="11" viewBox="0 0 16 11" style="border-radius:1px"><rect width="5.3" height="11" x="0" fill="#009246"/><rect width="5.3" height="11" x="5.3" fill="#fff"/><rect width="5.3" height="11" x="10.7" fill="#CE2B37"/></svg>'
};
function addBubbles(lang, orig, trans) {
  const tgt=lang==='de'?'it':'de', log=document.getElementById('log');
  const tgtCode = lang==='de'?'it-IT':'de-DE';

  // Original bubble
  const d1=document.createElement('div'); d1.className='bubble '+lang;
  d1.innerHTML=`<div class="bubble-label">${FLAG[lang]} ${lang==='de'?'Deutsch':'Italiano'}</div><div>${orig}</div>`;
  log.appendChild(d1);

  // Translation bubble with play button
  const d2=document.createElement('div'); d2.className='bubble '+tgt;
  const btnId='play-'+Date.now();
  d2.innerHTML=`<div class="bubble-label">${FLAG[tgt]} ${tgt==='de'?'Deutsch':'Italiano'}
    <button id="${btnId}" onclick="playTTS(this,'${tgtCode}')" style="margin-left:auto;background:#1A1208;color:#F5F0E8;border:none;border-radius:6px;padding:3px 10px;font-size:13px;cursor:pointer;">▶ Anhören</button>
  </div><div>${trans}</div>`;
  log.appendChild(d2);

  // Store text on button for TTS
  document.getElementById(btnId)._text = trans;

  log.lastChild.scrollIntoView({behavior:'smooth',block:'nearest'});
  document.getElementById('reset-btn').className='reset-btn show';

  // Try auto-TTS (works on desktop; on Android needs user tap)
  tryAutoSpeak(trans, tgtCode, lang);
}

function playTTS(btn, langCode) {
  const text = btn._text || btn.closest('.bubble').querySelector('div:last-child').textContent;
  window.speechSynthesis?.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = langCode; utt.rate = 0.92;
  window.speechSynthesis.speak(utt);
}

function tryAutoSpeak(text, langCode, fromLang) {
  if (!window.speechSynthesis) { afterSpeaking(fromLang); return; }
  window.speechSynthesis.cancel();
  setUI('speaking', fromLang);
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = langCode; utt.rate = 0.92;
  utt.onend  = () => afterSpeaking(fromLang);
  utt.onerror = () => { setUI('idle'); }; // On Android: silent fail, user uses ▶ button
  window.speechSynthesis.speak(utt);
  // Android workaround: check after 1s if speech started
  setTimeout(() => {
    if (window.speechSynthesis.speaking) return; // OK
    setUI('idle'); // Not speaking → let user use ▶ button
  }, 1000);
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetAll() {
  window.speechSynthesis?.cancel();
  if (mediaRecorder?.state!=='inactive') mediaRecorder?.stop();
  audioStream?.getTracks().forEach(t=>t.stop());
  meterStream?.getTracks().forEach(t=>t.stop());
  meterCtx?.close().catch(()=>{});
  stopTimer(); audioChunks=[];
  document.getElementById('log').innerHTML='';
  document.getElementById('reset-btn').className='reset-btn';
  document.getElementById('err-box').style.display='none';
  document.getElementById('meter-wrap').style.display='none';
  setUI('idle','de');
}
</script>
</body>
</html>
