<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gespräch DE ↔ IT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 70% 10%, #e8d5b0 0%, #F5F0E8 60%, #d4c4a0 100%);
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 16px 60px;
  }
  h1 { font-size: clamp(20px,5vw,30px); font-weight:700; color:#1A1208; letter-spacing:0.04em; text-transform:uppercase; margin-bottom:4px; }
  .subtitle { font-size:13px; color:#8B7355; font-style:italic; letter-spacing:0.08em; margin-bottom:18px; }

  /* Key bar */
  .key-bar { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding:9px 16px; border-radius:10px; border:1px solid #C8B89A; background:rgba(255,255,255,0.4); font-size:13px; font-family:inherit; width:100%; max-width:500px; }
  .key-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .key-dot.ok { background:#2D5016; box-shadow:0 0 6px rgba(45,80,22,0.6); }
  .key-dot.missing { background:#b44; animation:blink 1s infinite; }
  .key-label { color:#5a4228; flex:1; }
  .key-btn { background:#1A1208; color:#F5F0E8; border:none; border-radius:7px; padding:5px 13px; font-size:12px; cursor:pointer; font-family:inherit; }
  .key-btn:hover { background:#C4622D; }

  /* Mode bar */
  .mode-bar { display:flex; align-items:center; gap:0; background:#1A1208; border-radius:12px; padding:6px; margin-bottom:28px; box-shadow:0 4px 16px rgba(0,0,0,0.25); }
  .mode-side { display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:8px; font-size:14px; font-weight:600; letter-spacing:0.04em; color:rgba(255,255,255,0.4); transition:all 0.3s; text-transform:uppercase; }
  .mode-side.active-de { background:#C4622D; color:#fff; }
  .mode-side.active-it { background:#2D5016; color:#fff; }
  .mode-arrow { color:rgba(255,255,255,0.25); font-size:16px; padding:0 4px; }

  /* Mic button */
  .mic-wrap { position:relative; display:flex; align-items:center; justify-content:center; width:160px; height:160px; margin-bottom:16px; }
  .ring { position:absolute; border-radius:50%; pointer-events:none; opacity:0; }
  .ring1 { width:130px; height:130px; border:3px solid #C4622D; }
  .ring2 { width:155px; height:155px; border:2px solid #C4622D; }
  .ring1.it { border-color:#2D5016; } .ring2.it { border-color:#2D5016; }
  .show-ring .ring1 { animation:ringPulse 1.6s ease-out infinite; }
  .show-ring .ring2 { animation:ringPulse 1.6s ease-out 0.5s infinite; }
  .mic-btn { position:relative; z-index:1; width:100px; height:100px; border-radius:50%; border:none; background:#1A1208; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.3s; box-shadow:0 8px 32px rgba(0,0,0,0.4); font-size:40px; }
  .mic-btn:disabled { cursor:default; opacity:0.7; }
  .mic-btn.de-rec { background:#C4622D; transform:scale(1.06); box-shadow:0 0 0 4px rgba(196,98,45,0.35),0 8px 32px rgba(196,98,45,0.5); }
  .mic-btn.it-rec { background:#2D5016; transform:scale(1.06); box-shadow:0 0 0 4px rgba(45,80,22,0.35),0 8px 32px rgba(45,80,22,0.5); }
  .mic-btn.busy { background:#8B7355; }
  .spinner { width:40px; height:40px; border:3px solid rgba(245,240,232,0.3); border-top-color:#F5F0E8; border-radius:50%; animation:spin 0.8s linear infinite; display:none; }

  /* Level meter */
  .meter-wrap { display:none; align-items:center; gap:10px; width:100%; max-width:300px; margin-bottom:14px; }
  .meter-track { flex:1; height:12px; background:rgba(0,0,0,0.1); border-radius:6px; overflow:hidden; }
  .meter-fill { height:100%; width:0%; border-radius:6px; transition:width 0.05s; background:#C4622D; }

  /* Status */
  .status { font-size:15px; color:#8B7355; font-style:italic; min-height:24px; margin-bottom:20px; text-align:center; max-width:360px; }
  .status.rec { font-size:19px; font-style:normal; font-weight:700; color:#C4622D; }
  .status.rec-it { font-size:19px; font-style:normal; font-weight:700; color:#2D5016; }

  /* Error box */
  .err-box { display:none; width:100%; max-width:500px; margin-bottom:14px; padding:12px 16px; border-radius:10px; background:rgba(180,50,30,0.1); border:1px solid rgba(180,50,30,0.35); color:#7a1a0a; font-size:13px; line-height:1.6; text-align:center; }

  /* Bubbles */
  .log { width:100%; max-width:580px; display:flex; flex-direction:column; gap:12px; margin-bottom:20px; }
  .bubble { max-width:85%; padding:12px 16px; border-radius:14px; font-size:15px; line-height:1.6; animation:fadeIn 0.3s ease-out; }
  .bubble.de { align-self:flex-start; background:rgba(196,98,45,0.1); border:1px solid rgba(196,98,45,0.25); border-bottom-left-radius:4px; }
  .bubble.it { align-self:flex-end; background:rgba(45,80,22,0.09); border:1px solid rgba(45,80,22,0.2); border-bottom-right-radius:4px; color:#1A3A0A; }
  .bubble-label { font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:5px; opacity:0.6; display:flex; align-items:center; gap:5px; }
  .bubble.de .bubble-label { color:#C4622D; } .bubble.it .bubble-label { color:#2D5016; }
  .bubble-orig { font-size:12px; color:#8B7355; font-style:italic; margin-top:6px; }

  .reset-btn { margin-top:8px; background:transparent; border:1px solid #C8B89A; border-radius:8px; padding:9px 22px; color:#8B7355; cursor:pointer; font-size:14px; font-family:inherit; display:none; }
  .reset-btn.show { display:block; }

  @keyframes ringPulse { 0%{transform:scale(0.85);opacity:0.8} 100%{transform:scale(1.4);opacity:0} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .blink { animation:blink 1.2s ease-in-out infinite; }
</style>
</head>
<body>

<h1>Gesprächs&shy;übersetzer</h1>
<p class="subtitle">Deutsch · Italiano — powered by Claude</p>

<!-- Key bar -->
<div class="key-bar">
  <div class="key-dot" id="key-dot"></div>
  <span class="key-label" id="key-label">…</span>
  <button class="key-btn" onclick="changeKey()">🔑 Key ändern</button>
</div>

<!-- Mode bar -->
<div class="mode-bar">
  <div class="mode-side" id="side-de">
    <svg width="24" height="16" viewBox="0 0 24 16" style="border-radius:2px;flex-shrink:0">
      <rect width="24" height="5.3" y="0" fill="#000"/>
      <rect width="24" height="5.3" y="5.3" fill="#DD0000"/>
      <rect width="24" height="5.3" y="10.7" fill="#FFCE00"/>
    </svg>Deutsch
  </div>
  <span class="mode-arrow">⇄</span>
  <div class="mode-side" id="side-it">
    <svg width="24" height="16" viewBox="0 0 24 16" style="border-radius:2px;flex-shrink:0">
      <rect width="8" height="16" x="0" fill="#009246"/>
      <rect width="8" height="16" x="8" fill="#fff"/>
      <rect width="8" height="16" x="16" fill="#CE2B37"/>
    </svg>Italiano
  </div>
</div>

<!-- Mic -->
<div class="mic-wrap" id="mic-wrap">
  <div class="ring ring1" id="ring1"></div>
  <div class="ring ring2" id="ring2"></div>
  <button class="mic-btn" id="mic-btn" onclick="handleMicClick()">
    <span id="mic-icon">🎙️</span>
    <div id="spinner" class="spinner"></div>
  </button>
</div>

<!-- Level meter -->
<div class="meter-wrap" id="meter-wrap">
  <span style="font-size:12px;color:#8B7355;white-space:nowrap">🎙️ Signal</span>
  <div class="meter-track"><div class="meter-fill" id="meter-fill"></div></div>
</div>

<div class="status" id="status">Deutsch sprechen — Mikrofon tippen</div>
<div class="err-box" id="err-box"></div>
<div class="log" id="log"></div>
<button class="reset-btn" id="reset-btn" onclick="resetAll()">↺ Gespräch neu starten</button>

<script>
// ── API Key ───────────────────────────────────────────────────────────────────
function updateKeyUI() {
  const key = localStorage.getItem('bl_api_key') || '';
  const dot = document.getElementById('key-dot');
  const lbl = document.getElementById('key-label');
  if (key.length > 10) {
    dot.className = 'key-dot ok';
    lbl.textContent = 'API Key vorhanden (sk-…' + key.slice(-4) + ')';
  } else {
    dot.className = 'key-dot missing';
    lbl.textContent = 'Kein API Key!';
  }
}
function changeKey() {
  const k = prompt('Anthropic API Key:', localStorage.getItem('bl_api_key') || '');
  if (k && k.trim()) { localStorage.setItem('bl_api_key', k.trim()); updateKeyUI(); }
}
(function(){
  if (!localStorage.getItem('bl_api_key')) {
    const k = prompt('Anthropic API Key:');
    if (k && k.trim()) localStorage.setItem('bl_api_key', k.trim());
  }
  updateKeyUI();
})();

// ── State ─────────────────────────────────────────────────────────────────────
let turn  = 'de';
let phase = 'idle';
let mediaRecorder = null;
let audioChunks   = [];
let audioStream   = null;
let meterRAF      = null;

// ── UI ────────────────────────────────────────────────────────────────────────
function setUI(newPhase, newTurn) {
  if (newPhase !== undefined) phase = newPhase;
  if (newTurn  !== undefined) turn  = newTurn;

  const btn    = document.getElementById('mic-btn');
  const icon   = document.getElementById('mic-icon');
  const spin   = document.getElementById('spinner');
  const status = document.getElementById('status');
  const wrap   = document.getElementById('mic-wrap');
  const r1     = document.getElementById('ring1');
  const r2     = document.getElementById('ring2');
  document.getElementById('side-de').className = 'mode-side' + (phase==='recording'&&turn==='de'?' active-de':'');
  document.getElementById('side-it').className = 'mode-side' + (phase==='recording'&&turn==='it'?' active-it':'');

  wrap.className  = 'mic-wrap' + (phase==='recording'?' show-ring':'');
  r1.className    = 'ring ring1' + (turn==='it'?' it':'');
  r2.className    = 'ring ring2' + (turn==='it'?' it':'');
  btn.className   = 'mic-btn' + (phase==='recording'?(turn==='de'?' de-rec':' it-rec'):phase==='processing'?' busy':'');
  btn.disabled    = (phase==='processing');
  icon.style.display = phase==='processing'?'none':'';
  spin.style.display = phase==='processing'?'block':'none';
  icon.textContent   = phase==='recording'?'⏹':phase==='speaking'?'🔊':'🎙️';

  status.className = 'status' + (phase==='recording'?(turn==='de'?' rec':' rec-it blink'):'');
  if (phase==='idle')       status.textContent = turn==='de'?'Deutsch sprechen — Mikrofon tippen':'Tippen für nächste deutsche Frage';
  else if (phase==='recording'&&turn==='de') status.textContent = '⏹ Fertig sprechen? Nochmal tippen!';
  else if (phase==='recording'&&turn==='it') status.textContent = '⏹ Finito? Tocca di nuovo!';
  else if (phase==='processing') status.textContent = 'Claude übersetzt…';
  else if (phase==='speaking')   status.textContent = '🔊 Wiedergabe…';
}

function showErr(msg) {
  const b = document.getElementById('err-box');
  b.innerHTML = msg; b.style.display = 'block';
  setTimeout(() => b.style.display='none', 8000);
}

// ── Mic click ─────────────────────────────────────────────────────────────────
function handleMicClick() {
  if (phase === 'processing') return;
  if (phase === 'speaking')   { stopSpeaking(); return; }
  if (phase === 'recording')  { stopRecording(); return; }
  startRecording(turn);
}

// ── MediaRecorder ─────────────────────────────────────────────────────────────
async function startRecording(lang) {
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    showErr('🚫 Mikrofon verweigert: ' + e.message); return;
  }

  // Level meter
  const ctx = new AudioContext();
  const src = ctx.createMediaStreamSource(audioStream);
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  const buf = new Uint8Array(analyser.frequencyBinCount);
  const fill = document.getElementById('meter-fill');
  document.getElementById('meter-wrap').style.display = 'flex';
  function drawMeter() {
    if (phase !== 'recording') {
      document.getElementById('meter-wrap').style.display = 'none';
      ctx.close(); return;
    }
    analyser.getByteFrequencyData(buf);
    const avg = buf.reduce((a,b)=>a+b,0)/buf.length;
    const pct = Math.min(100, avg*3);
    fill.style.width = pct+'%';
    fill.style.background = pct > 15 ? '#2D5016' : '#C4622D';
    meterRAF = requestAnimationFrame(drawMeter);
  }
  drawMeter();

  // Pick best supported format
  const formats = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4','audio/wav'];
  const mimeType = formats.find(f => MediaRecorder.isTypeSupported(f)) || '';

  audioChunks = [];
  mediaRecorder = new MediaRecorder(audioStream, mimeType ? { mimeType } : {});
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = () => processAudio(lang);
  mediaRecorder.start(100);
  setUI('recording', lang);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  audioStream?.getTracks().forEach(t => t.stop());
  setUI('processing');
}

// ── Send audio to Claude ──────────────────────────────────────────────────────
async function processAudio(lang) {
  const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
  if (blob.size < 1000) { showErr('🔇 Aufnahme zu kurz — bitte länger sprechen.'); setUI('idle'); return; }

  const base64 = await blobToBase64(blob);
  const srcLang = lang === 'de' ? 'German'  : 'Italian';
  const tgtLang = lang === 'de' ? 'Italian' : 'German';
  const key = localStorage.getItem('bl_api_key') || '';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1024,
        system: `You are a transcription and translation assistant. The user speaks ${srcLang}. 
Transcribe exactly what they say, then translate to ${tgtLang}.
Respond ONLY with valid JSON in this exact format (no markdown, no extra text):
{"original":"<transcribed text>","translation":"<translated text>"}`,
        messages: [{
          role: 'user',
          content: [{
            type: 'document',
            source: {
              type: 'base64',
              media_type: blob.type.split(';')[0] || 'audio/webm',
              data: base64,
            }
          }, {
            type: 'text',
            text: `Transcribe this ${srcLang} audio and translate to ${tgtLang}.`
          }]
        }]
      }),
    });

    const data = await res.json();
    if (data.error) { showErr('API Fehler: ' + data.error.message); setUI('idle'); return; }

    const raw = data.content?.find(b => b.type === 'text')?.text || '';
    let parsed;
    try {
      const clean = raw.replace(/```json|```/g,'').trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      showErr('Antwort konnte nicht geparst werden: ' + raw.slice(0,100));
      setUI('idle'); return;
    }

    const original    = parsed.original    || '';
    const translation = parsed.translation || '';
    if (!translation) { showErr('Keine Übersetzung erhalten.'); setUI('idle'); return; }

    addBubble(lang, original, translation);
    speakText(translation, lang === 'de' ? 'it-IT' : 'de-DE', lang);

  } catch(e) {
    showErr('Netzwerkfehler: ' + e.message);
    setUI('idle');
  }
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function speakText(text, langCode, fromLang) {
  if (!window.speechSynthesis) { afterSpeaking(fromLang); return; }
  window.speechSynthesis.cancel();
  setUI('speaking', fromLang);
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = langCode; utt.rate = 0.92;
  utt.onend = utt.onerror = () => afterSpeaking(fromLang);
  window.speechSynthesis.speak(utt);
}

function stopSpeaking() { window.speechSynthesis?.cancel(); setUI('idle','de'); }

function afterSpeaking(fromLang) {
  if (fromLang === 'de') {
    setUI('recording', 'it');
    // Auto-start Italian recording
    setTimeout(() => startRecording('it'), 700);
  } else {
    setUI('idle', 'de');
  }
}

// ── Bubbles ───────────────────────────────────────────────────────────────────
const FLAG = {
  de: '<svg width="16" height="11" viewBox="0 0 16 11" style="border-radius:1px"><rect width="16" height="3.7" y="0" fill="#000"/><rect width="16" height="3.7" y="3.7" fill="#DD0000"/><rect width="16" height="3.7" y="7.3" fill="#FFCE00"/></svg>',
  it: '<svg width="16" height="11" viewBox="0 0 16 11" style="border-radius:1px"><rect width="5.3" height="11" x="0" fill="#009246"/><rect width="5.3" height="11" x="5.3" fill="#fff"/><rect width="5.3" height="11" x="10.7" fill="#CE2B37"/></svg>',
};

function addBubble(fromLang, original, translation) {
  const tgtLang = fromLang === 'de' ? 'it' : 'de';
  const log = document.getElementById('log');

  // Original bubble
  const d1 = document.createElement('div');
  d1.className = 'bubble ' + fromLang;
  d1.innerHTML = `<div class="bubble-label">${FLAG[fromLang]} ${fromLang==='de'?'Deutsch':'Italiano'}</div><div>${original}</div>`;
  log.appendChild(d1);

  // Translation bubble
  const d2 = document.createElement('div');
  d2.className = 'bubble ' + tgtLang;
  d2.innerHTML = `<div class="bubble-label">${FLAG[tgtLang]} ${tgtLang==='de'?'Deutsch':'Italiano'}</div><div>${translation}</div>`;
  log.appendChild(d2);

  d2.scrollIntoView({ behavior:'smooth', block:'nearest' });
  document.getElementById('reset-btn').className = 'reset-btn show';
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetAll() {
  window.speechSynthesis?.cancel();
  if (mediaRecorder?.state !== 'inactive') mediaRecorder?.stop();
  audioStream?.getTracks().forEach(t => t.stop());
  cancelAnimationFrame(meterRAF);
  audioChunks = [];
  document.getElementById('log').innerHTML = '';
  document.getElementById('reset-btn').className = 'reset-btn';
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('meter-wrap').style.display = 'none';
  setUI('idle','de');
}
</script>
</body>
</html>
