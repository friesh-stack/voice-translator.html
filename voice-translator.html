<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="DE · IT"/>
<meta name="theme-color" content="#C4622D"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-512.png"/>
<title>Gespräch DE ↔ IT</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html { font-size:28px; }

body {
  min-height:100vh;
  background:radial-gradient(ellipse at 70% 10%,#e8d5b0 0%,#F5F0E8 60%,#d4c4a0 100%);
  font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;
  display:flex; flex-direction:column; align-items:center;
  padding:1.5rem 1rem 3rem;
}

h1 { font-size:1.8rem; font-weight:700; color:#1A1208; letter-spacing:0.04em; text-transform:uppercase; margin-bottom:0.2rem; text-align:center; }
.subtitle { font-size:0.7rem; color:#8B7355; font-style:italic; margin-bottom:1rem; text-align:center; }

.key-bar { display:flex; align-items:center; gap:0.4rem; margin-bottom:0.8rem; padding:0.5rem 0.7rem; border-radius:0.6rem; border:1px solid #C8B89A; background:rgba(255,255,255,0.4); width:100%; max-width:22rem; }
.key-dot { width:0.5rem; height:0.5rem; border-radius:50%; flex-shrink:0; }
.key-dot.ok { background:#2D5016; }
.key-dot.missing { background:#b44; animation:blink 1s infinite; }
.key-label { color:#5a4228; flex:1; font-size:0.6rem; }
.key-btn { background:#1A1208; color:#F5F0E8; border:none; border-radius:0.4rem; padding:0.3rem 0.6rem; font-size:0.6rem; cursor:pointer; font-family:inherit; white-space:nowrap; }

.mode-bar { display:flex; align-items:center; background:#1A1208; border-radius:0.8rem; padding:0.3rem; margin-bottom:1.5rem; box-shadow:0 4px 16px rgba(0,0,0,0.25); }
.mode-side { display:flex; align-items:center; gap:0.4rem; padding:0.6rem 1rem; border-radius:0.6rem; font-size:0.75rem; font-weight:700; color:rgba(255,255,255,0.4); transition:all 0.3s; text-transform:uppercase; }
.mode-side.active-de { background:#C4622D; color:#fff; }
.mode-side.active-it { background:#2D5016; color:#fff; }
.mode-arrow { color:rgba(255,255,255,0.25); font-size:0.8rem; padding:0 0.3rem; }

.mic-wrap { position:relative; display:flex; align-items:center; justify-content:center; width:6rem; height:6rem; margin-bottom:0.8rem; }
.ring { position:absolute; border-radius:50%; pointer-events:none; opacity:0; }
.ring1 { width:5rem; height:5rem; border:3px solid #C4622D; }
.ring2 { width:5.9rem; height:5.9rem; border:2px solid #C4622D; }
.ring1.it { border-color:#2D5016; } .ring2.it { border-color:#2D5016; }
.show-ring .ring1 { animation:ringPulse 1.6s ease-out infinite; }
.show-ring .ring2 { animation:ringPulse 1.6s ease-out 0.5s infinite; }

.mic-btn {
  position:relative; z-index:1;
  width:3.8rem; height:3.8rem; border-radius:50%;
  border:none; background:#1A1208;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.3s;
  box-shadow:0 4px 16px rgba(0,0,0,0.4); font-size:1.6rem;
}
.mic-btn:disabled { cursor:default; }
.mic-btn.de-rec { background:#C4622D; transform:scale(1.06); }
.mic-btn.it-rec { background:#2D5016; transform:scale(1.06); }
.mic-btn.busy { background:#8B7355; }
.spinner { width:1.5rem; height:1.5rem; border:3px solid rgba(245,240,232,0.3); border-top-color:#F5F0E8; border-radius:50%; animation:spin 0.8s linear infinite; display:none; }

.meter-wrap { display:none; align-items:center; gap:0.4rem; width:100%; max-width:14rem; margin-bottom:0.5rem; }
.meter-track { flex:1; height:0.6rem; background:rgba(0,0,0,0.1); border-radius:0.3rem; overflow:hidden; }
.meter-fill { height:100%; width:0%; border-radius:0.3rem; transition:width 0.05s; }

.status { font-size:0.75rem; color:#8B7355; font-style:italic; min-height:1rem; margin-bottom:0.3rem; text-align:center; max-width:18rem; }
.status.rec-de { font-style:normal; font-weight:700; color:#C4622D; }
.status.rec-it { font-style:normal; font-weight:700; color:#2D5016; }

.rec-timer { font-size:1.4rem; font-weight:700; color:#C4622D; min-height:1.8rem; text-align:center; margin-bottom:0.6rem; font-family:monospace; }
.rec-timer.it { color:#2D5016; }

.err-box { display:none; width:100%; max-width:22rem; margin-bottom:0.6rem; padding:0.6rem 0.8rem; border-radius:0.6rem; background:rgba(180,50,30,0.1); border:1px solid rgba(180,50,30,0.35); color:#7a1a0a; font-size:0.65rem; line-height:1.5; text-align:center; }

.log { width:100%; max-width:22rem; display:flex; flex-direction:column; gap:0.6rem; margin-bottom:0.8rem; }
.bubble { max-width:90%; padding:0.7rem 0.9rem; border-radius:0.9rem; font-size:0.85rem; line-height:1.6; animation:fadeIn 0.3s ease-out; }
.bubble.de { align-self:flex-start; background:rgba(196,98,45,0.1); border:1px solid rgba(196,98,45,0.25); border-bottom-left-radius:3px; }
.bubble.it { align-self:flex-end; background:rgba(45,80,22,0.09); border:1px solid rgba(45,80,22,0.2); border-bottom-right-radius:3px; color:#1A3A0A; }
.bubble-label { font-size:0.5rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:0.3rem; opacity:0.6; display:flex; align-items:center; gap:0.3rem; }
.bubble.de .bubble-label { color:#C4622D; }
.bubble.it .bubble-label { color:#2D5016; }

.reset-btn { margin-top:0.5rem; background:transparent; border:1px solid #C8B89A; border-radius:0.6rem; padding:0.5rem 1.2rem; color:#8B7355; cursor:pointer; font-size:0.65rem; font-family:inherit; display:none; }
.reset-btn.show { display:block; }

@keyframes ringPulse { 0%{transform:scale(0.85);opacity:0.8} 100%{transform:scale(1.4);opacity:0} }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
</style>
</head>
<body>

<h1>Gesprächs&shy;übersetzer</h1>
<p class="subtitle">Deutsch · Italiano — Claude + Whisper</p>

<div class="key-bar">
  <div class="key-dot" id="key-dot"></div>
  <span class="key-label" id="key-label">…</span>
  <button class="key-btn" onclick="changeKey()">🔑 Key</button>
</div>

<div class="mode-bar">
  <div class="mode-side" id="side-de">
    <svg width="20" height="14" viewBox="0 0 20 14" style="border-radius:2px;flex-shrink:0"><rect width="20" height="4.7" y="0" fill="#000"/><rect width="20" height="4.7" y="4.7" fill="#DD0000"/><rect width="20" height="4.7" y="9.3" fill="#FFCE00"/></svg>DE
  </div>
  <span class="mode-arrow">⇄</span>
  <div class="mode-side" id="side-it">
    <svg width="20" height="14" viewBox="0 0 20 14" style="border-radius:2px;flex-shrink:0"><rect width="6.7" height="14" x="0" fill="#009246"/><rect width="6.7" height="14" x="6.7" fill="#fff"/><rect width="6.7" height="14" x="13.3" fill="#CE2B37"/></svg>IT
  </div>
</div>

<div class="mic-wrap" id="mic-wrap">
  <div class="ring ring1" id="ring1"></div>
  <div class="ring ring2" id="ring2"></div>
  <button class="mic-btn" id="mic-btn" onclick="handleMicClick()">
    <span id="mic-icon">🎙️</span>
    <div id="spinner" class="spinner"></div>
  </button>
</div>

<div class="meter-wrap" id="meter-wrap">
  <span style="font-size:0.6rem;color:#8B7355">🎙️</span>
  <div class="meter-track"><div class="meter-fill" id="meter-fill"></div></div>
</div>

<div class="status" id="status">Deutsch sprechen — Mikrofon tippen</div>
<div class="rec-timer" id="rec-timer"></div>
<div class="err-box" id="err-box"></div>
<div class="log" id="log"></div>
<button class="reset-btn" id="reset-btn" onclick="resetAll()">↺ Neu starten</button>

<script>
const WORKER_URL = 'https://blue-lagune-proxy.friesh.workers.dev';

function updateKeyUI() {
  const key = localStorage.getItem('bl_api_key') || '';
  document.getElementById('key-dot').className = 'key-dot ' + (key.length>10?'ok':'missing');
  document.getElementById('key-label').textContent = key.length>10 ? 'Key: sk-…'+key.slice(-4) : 'Kein Key!';
}
function changeKey() {
  const k = prompt('Anthropic API Key:', localStorage.getItem('bl_api_key')||'');
  if (k?.trim()) { localStorage.setItem('bl_api_key', k.trim()); updateKeyUI(); }
}
(function(){ if (!localStorage.getItem('bl_api_key')) { const k=prompt('Anthropic API Key:'); if(k?.trim()) localStorage.setItem('bl_api_key',k.trim()); } updateKeyUI(); })();

let turn='de', phase='idle';
let mediaRecorder=null, audioChunks=[], audioStream=null;
let meterCtx=null, meterStream=null;
let timerInterval=null, recSeconds=0;

function setUI(p,t) {
  if(p!==undefined) phase=p;
  if(t!==undefined) turn=t;
  const btn=document.getElementById('mic-btn'),
        icon=document.getElementById('mic-icon'),
        spin=document.getElementById('spinner'),
        status=document.getElementById('status'),
        wrap=document.getElementById('mic-wrap');
  document.getElementById('side-de').className='mode-side'+(phase==='recording'&&turn==='de'?' active-de':'');
  document.getElementById('side-it').className='mode-side'+(phase==='recording'&&turn==='it'?' active-it':'');
  wrap.className='mic-wrap'+(phase==='recording'?' show-ring':'');
  document.getElementById('ring1').className='ring ring1'+(turn==='it'?' it':'');
  document.getElementById('ring2').className='ring ring2'+(turn==='it'?' it':'');
  btn.className='mic-btn'+(phase==='recording'?(turn==='de'?' de-rec':' it-rec'):phase==='processing'?' busy':'');
  btn.disabled=(phase==='processing');
  icon.style.display=phase==='processing'?'none':'';
  spin.style.display=phase==='processing'?'block':'none';
  icon.textContent=phase==='recording'?'⏹':phase==='speaking'?'🔊':'🎙️';
  status.className='status'+(phase==='recording'?(turn==='de'?' rec-de':' rec-it'):'');
  if(phase==='idle') status.textContent=turn==='de'?'Deutsch tippen → sprechen':'Italiano: tippen → parlare';
  else if(phase==='recording'&&turn==='de') status.textContent='⏹ Fertig? Nochmal tippen!';
  else if(phase==='recording'&&turn==='it') status.textContent='⏹ Finito? Tocca!';
  else if(phase==='processing') status.textContent='Übersetzt…';
  else if(phase==='speaking') status.textContent='🔊 Wiedergabe…';
  if(phase==='recording') startTimer(); else stopTimer();
}

function showErr(msg) {
  const b=document.getElementById('err-box'); b.innerHTML=msg; b.style.display='block';
  setTimeout(()=>b.style.display='none',9000);
}

function startTimer() {
  recSeconds=0; clearInterval(timerInterval);
  const el=document.getElementById('rec-timer');
  el.className='rec-timer'+(turn==='it'?' it':'');
  timerInterval=setInterval(()=>{ recSeconds++; el.textContent='⏱ '+recSeconds+'s'; },1000);
}
function stopTimer() { clearInterval(timerInterval); document.getElementById('rec-timer').textContent=''; }

function handleMicClick() {
  if(phase==='processing') return;
  if(phase==='speaking') { stopSpeaking(); return; }
  if(phase==='recording') { stopRecording(); return; }
  startRecording(turn);
}

async function startRecording(lang) {
  try { audioStream=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,sampleRate:16000,echoCancellation:true,noiseSuppression:true}}); }
  catch(e) { showErr('🚫 Mikrofon: '+e.message); return; }
  try {
    meterStream=await navigator.mediaDevices.getUserMedia({audio:true});
    meterCtx=new AudioContext();
    const src=meterCtx.createMediaStreamSource(meterStream);
    const analyser=meterCtx.createAnalyser(); analyser.fftSize=256;
    src.connect(analyser);
    const buf=new Uint8Array(analyser.frequencyBinCount);
    const fill=document.getElementById('meter-fill');
    document.getElementById('meter-wrap').style.display='flex';
    function draw() {
      if(phase!=='recording'){document.getElementById('meter-wrap').style.display='none';return;}
      analyser.getByteFrequencyData(buf);
      const avg=buf.reduce((a,b)=>a+b,0)/buf.length;
      fill.style.width=Math.min(100,avg*3)+'%';
      fill.style.background=avg>4?'#2D5016':'#C4622D';
      requestAnimationFrame(draw);
    }
    draw();
  } catch(e) {}
  const fmt=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'].find(f=>MediaRecorder.isTypeSupported(f))||'';
  audioChunks=[];
  mediaRecorder=new MediaRecorder(audioStream,fmt?{mimeType:fmt}:{});
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
  mediaRecorder.onstop=()=>processAudio(lang);
  mediaRecorder.start(100);
  setUI('recording',lang);
}

function stopRecording() {
  if(mediaRecorder?.state!=='inactive') mediaRecorder.stop();
  audioStream?.getTracks().forEach(t=>t.stop());
  meterStream?.getTracks().forEach(t=>t.stop());
  meterCtx?.close().catch(()=>{});
  setUI('processing');
}

async function convertToWav(blob) {
  try {
    const ab=await blob.arrayBuffer();
    const ctx=new AudioContext({sampleRate:16000});
    const decoded=await ctx.decodeAudioData(ab);
    ctx.close();
    const samples=decoded.getChannelData(0);
    const pcm=new Int16Array(samples.length);
    for(let i=0;i<samples.length;i++) pcm[i]=Math.max(-32768,Math.min(32767,samples[i]*32768));
    const wav=new ArrayBuffer(44+pcm.byteLength);
    const v=new DataView(wav);
    [82,73,70,70].forEach((b,i)=>v.setUint8(i,b));
    v.setUint32(4,36+pcm.byteLength,true);
    [87,65,86,69,102,109,116,32].forEach((b,i)=>v.setUint8(8+i,b));
    v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
    v.setUint32(24,16000,true);v.setUint32(28,32000,true);v.setUint16(32,2,true);v.setUint16(34,16,true);
    [100,97,116,97].forEach((b,i)=>v.setUint8(36+i,b));
    v.setUint32(40,pcm.byteLength,true);
    new Int16Array(wav,44).set(pcm);
    return new Blob([wav],{type:'audio/wav'});
  } catch(e) { return blob; }
}

async function processAudio(lang) {
  const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});
  if(blob.size<1000){showErr('🔇 Zu kurz — länger sprechen.');setUI('idle');return;}
  const key=localStorage.getItem('bl_api_key')||'';
  const src=lang==='de'?'German':'Italian', tgt=lang==='de'?'Italian':'German';
  try {
    const wav=await convertToWav(blob);
    const bytes=new Uint8Array(await wav.arrayBuffer());
    let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
    const b64=btoa(bin);
    const tres=await fetch(WORKER_URL+'/transcribe',{method:'POST',body:JSON.stringify({audio:b64,lang}),headers:{'Content-Type':'application/json'}});
    const td=await tres.json();
    if(td.error){showErr('Whisper: '+td.error);setUI('idle');return;}
    const transcript=(td.text||'').trim();
    if(!transcript){showErr('🔇 Nicht erkannt — deutlicher sprechen.');setUI('idle');return;}
    const cres=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,
        system:`Translate ${src} to ${tgt}. Return ONLY the translation.`,
        messages:[{role:'user',content:transcript}]})
    });
    const cd=await cres.json();
    if(cd.error){showErr('Claude: '+cd.error.message);setUI('idle');return;}
    const translation=(cd.content?.find(b=>b.type==='text')?.text||'').trim();
    addBubbles(lang,transcript,translation);
    setUI('idle');
    trySpeak(translation,lang==='de'?'it-IT':'de-DE',lang);
  } catch(e){showErr('Fehler: '+e.message);setUI('idle');}
}

function trySpeak(text,code,fromLang) {
  if(!window.speechSynthesis){afterSpeaking(fromLang);return;}
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang=code; utt.rate=0.92;
  utt.onend=utt.onerror=()=>afterSpeaking(fromLang);
  window.speechSynthesis.speak(utt);
}
function stopSpeaking(){window.speechSynthesis?.cancel();setUI('idle','de');}
function afterSpeaking(fromLang){
  if(fromLang==='de'){setUI('idle','it');setTimeout(()=>startRecording('it'),700);}
  else setUI('idle','de');
}

const FLAG={
  de:'<svg width="14" height="10" viewBox="0 0 14 10" style="border-radius:1px"><rect width="14" height="3.3" y="0" fill="#000"/><rect width="14" height="3.3" y="3.3" fill="#DD0000"/><rect width="14" height="3.3" y="6.7" fill="#FFCE00"/></svg>',
  it:'<svg width="14" height="10" viewBox="0 0 14 10" style="border-radius:1px"><rect width="4.7" height="10" x="0" fill="#009246"/><rect width="4.7" height="10" x="4.7" fill="#fff"/><rect width="4.7" height="10" x="9.3" fill="#CE2B37"/></svg>'
};

function addBubbles(lang,orig,trans) {
  const tgt=lang==='de'?'it':'de', log=document.getElementById('log');
  const tgtCode=lang==='de'?'it-IT':'de-DE';
  const d1=document.createElement('div'); d1.className='bubble '+lang;
  d1.innerHTML=`<div class="bubble-label">${FLAG[lang]} ${lang==='de'?'Deutsch':'Italiano'}</div><div>${orig}</div>`;
  log.appendChild(d1);
  const d2=document.createElement('div'); d2.className='bubble '+tgt;
  const bid='p'+Date.now();
  d2.innerHTML=`<div class="bubble-label">${FLAG[tgt]} ${tgt==='de'?'Deutsch':'Italiano'}<button id="${bid}" onclick="playTTS(this,'${tgtCode}')" style="margin-left:auto;background:#1A1208;color:#F5F0E8;border:none;border-radius:4px;padding:2px 8px;font-size:0.5rem;cursor:pointer;">▶</button></div><div>${trans}</div>`;
  log.appendChild(d2);
  document.getElementById(bid)._text=trans;
  d2.scrollIntoView({behavior:'smooth',block:'nearest'});
  document.getElementById('reset-btn').className='reset-btn show';
}
function playTTS(btn,code){
  const text=btn._text||btn.closest('.bubble').querySelector('div:last-child').textContent;
  window.speechSynthesis?.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang=code; utt.rate=0.92;
  window.speechSynthesis.speak(utt);
}

function resetAll(){
  window.speechSynthesis?.cancel();
  if(mediaRecorder?.state!=='inactive') mediaRecorder?.stop();
  audioStream?.getTracks().forEach(t=>t.stop());
  meterStream?.getTracks().forEach(t=>t.stop());
  meterCtx?.close().catch(()=>{});
  stopTimer(); audioChunks=[];
  document.getElementById('log').innerHTML='';
  document.getElementById('reset-btn').className='reset-btn';
  document.getElementById('err-box').style.display='none';
  document.getElementById('meter-wrap').style.display='none';
  setUI('idle','de');
}
</script>
</body>
</html>
