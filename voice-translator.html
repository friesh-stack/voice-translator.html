<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gespräch DE ↔ IT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 70% 10%, #e8d5b0 0%, #F5F0E8 60%, #d4c4a0 100%);
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 16px 60px;
  }
  h1 { font-size: clamp(20px, 5vw, 30px); font-weight: 700; color: #1A1208; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #8B7355; font-style: italic; letter-spacing: 0.08em; margin-bottom: 24px; }

  .mode-bar { display: flex; align-items: center; gap: 0; background: #1A1208; border-radius: 12px; padding: 6px; margin-bottom: 32px; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
  .mode-side { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: rgba(255,255,255,0.4); transition: all 0.3s; text-transform: uppercase; }
  .mode-side.active-de { background: #C4622D; color: #fff; box-shadow: 0 2px 8px rgba(196,98,45,0.5); }
  .mode-side.active-it { background: #2D5016; color: #fff; box-shadow: 0 2px 8px rgba(45,80,22,0.5); }
  .mode-arrow { color: rgba(255,255,255,0.25); font-size: 16px; padding: 0 4px; }

  .mic-wrap { position: relative; display: flex; align-items: center; justify-content: center; width: 160px; height: 160px; margin-bottom: 20px; }
  .ring { position: absolute; border-radius: 50%; pointer-events: none; opacity: 0; }
  .ring1 { width: 130px; height: 130px; border: 3px solid #C4622D; }
  .ring2 { width: 155px; height: 155px; border: 2px solid #C4622D; }
  .ring1.it-color { border-color: #2D5016; }
  .ring2.it-color { border-color: #2D5016; }
  .show-ring .ring1 { animation: ringPulse 1.6s ease-out infinite; }
  .show-ring .ring2 { animation: ringPulse 1.6s ease-out 0.5s infinite; }

  .mic-btn { position: relative; z-index: 1; width: 100px; height: 100px; border-radius: 50%; border: none; background: #1A1208; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 32px rgba(0,0,0,0.4); font-size: 40px; line-height: 1; }
  .mic-btn:disabled { cursor: default; opacity: 0.7; }
  .mic-btn.de-active  { background: #C4622D; transform: scale(1.06); box-shadow: 0 0 0 4px rgba(196,98,45,0.35), 0 8px 32px rgba(196,98,45,0.5); }
  .mic-btn.it-active  { background: #2D5016; transform: scale(1.06); box-shadow: 0 0 0 4px rgba(45,80,22,0.35), 0 8px 32px rgba(45,80,22,0.5); }
  .mic-btn.busy-state { background: #8B7355; }

  .spinner { width: 40px; height: 40px; border: 3px solid rgba(245,240,232,0.3); border-top-color: #F5F0E8; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
  .status { font-size: 15px; color: #8B7355; font-style: italic; min-height: 24px; margin-bottom: 24px; text-align: center; max-width: 360px; }

  .log { width: 100%; max-width: 580px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .bubble { max-width: 85%; padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.6; animation: fadeIn 0.3s ease-out; }
  .bubble.de { align-self: flex-start; background: rgba(196,98,45,0.1); border: 1px solid rgba(196,98,45,0.25); border-bottom-left-radius: 4px; }
  .bubble.it { align-self: flex-end; background: rgba(45,80,22,0.09); border: 1px solid rgba(45,80,22,0.2); border-bottom-right-radius: 4px; color: #1A3A0A; }
  .bubble-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; opacity: 0.6; display: flex; align-items: center; gap: 5px; }
  .bubble.de .bubble-label { color: #C4622D; }
  .bubble.it .bubble-label { color: #2D5016; }

  .reset-btn { margin-top: 8px; background: transparent; border: 1px solid #C8B89A; border-radius: 8px; padding: 9px 22px; color: #8B7355; cursor: pointer; font-size: 14px; font-family: inherit; letter-spacing: 0.04em; display: none; }
  .reset-btn.show { display: block; }

  @keyframes ringPulse { 0%{transform:scale(0.85);opacity:0.8} 100%{transform:scale(1.4);opacity:0} }
  @keyframes spin      { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes fadeIn    { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  @keyframes blink     { 0%,100%{opacity:1} 50%{opacity:0.35} }
  .blink { animation: blink 1.2s ease-in-out infinite; }
</style>
</head>
<body>

<h1>Gesprächs&shy;übersetzer</h1>
<p class="subtitle">Deutsch · Italiano</p>

<div class="mode-bar">
  <div class="mode-side" id="side-de">
    <svg width="24" height="16" viewBox="0 0 24 16" style="border-radius:2px;flex-shrink:0">
      <rect width="24" height="5.3" y="0"    fill="#000"/>
      <rect width="24" height="5.3" y="5.3"  fill="#DD0000"/>
      <rect width="24" height="5.3" y="10.7" fill="#FFCE00"/>
    </svg>
    Deutsch
  </div>
  <span class="mode-arrow">⇄</span>
  <div class="mode-side" id="side-it">
    <svg width="24" height="16" viewBox="0 0 24 16" style="border-radius:2px;flex-shrink:0">
      <rect width="8" height="16" x="0"  fill="#009246"/>
      <rect width="8" height="16" x="8"  fill="#fff"/>
      <rect width="8" height="16" x="16" fill="#CE2B37"/>
    </svg>
    Italiano
  </div>
</div>

<div class="mic-wrap" id="mic-wrap">
  <div class="ring ring1" id="ring1"></div>
  <div class="ring ring2" id="ring2"></div>
  <button class="mic-btn" id="mic-btn" onclick="handleMicClick()">
    <span id="mic-icon">🎙️</span>
    <div id="spinner" class="spinner"></div>
  </button>
</div>

<div class="status" id="status">Deutsch sprechen — Mikrofon tippen</div>
<div class="log" id="log"></div>
<button class="reset-btn" id="reset-btn" onclick="resetAll()">↺ Gespräch neu starten</button>

<script>
if (!localStorage.getItem('bl_api_key')) {
  const k = prompt('Anthropic API Key:');
  if (k) localStorage.setItem('bl_api_key', k.trim());
}

let turn  = 'de';   // 'de' = waiting for German, 'it' = listening/waiting for Italian
let phase = 'idle'; // idle | listening | translating | speaking
let recognition = null;
let finalTranscript = '';

function setUI(newPhase, newTurn) {
  if (newPhase !== undefined) phase = newPhase;
  if (newTurn  !== undefined) turn  = newTurn;

  const btn    = document.getElementById('mic-btn');
  const icon   = document.getElementById('mic-icon');
  const spin   = document.getElementById('spinner');
  const status = document.getElementById('status');
  const wrap   = document.getElementById('mic-wrap');
  const r1     = document.getElementById('ring1');
  const r2     = document.getElementById('ring2');
  const sideDE = document.getElementById('side-de');
  const sideIT = document.getElementById('side-it');

  // Mode bar highlights
  sideDE.className = 'mode-side' + (phase === 'listening' && turn === 'de' ? ' active-de' : '');
  sideIT.className = 'mode-side' + (phase === 'listening' && turn === 'it' ? ' active-it' : '');

  // Rings
  wrap.className = 'mic-wrap' + (phase === 'listening' ? ' show-ring' : '');
  r1.className = 'ring ring1' + (turn === 'it' ? ' it-color' : '');
  r2.className = 'ring ring2' + (turn === 'it' ? ' it-color' : '');

  // Button
  btn.className = 'mic-btn' + (
    phase === 'listening' ? (turn === 'de' ? ' de-active' : ' it-active') :
    (phase === 'translating' || phase === 'speaking') ? ' busy-state' : ''
  );
  btn.disabled = (phase === 'translating');
  icon.style.display = (phase === 'translating') ? 'none' : '';
  spin.style.display = (phase === 'translating') ? 'block' : 'none';
  icon.textContent   = phase === 'listening' ? '⏹' : phase === 'speaking' ? '🔊' : '🎙️';

  // Status
  status.className = 'status' + (phase === 'listening' ? ' blink' : '');
  if (phase === 'idle') {
    status.textContent = 'Deutsch sprechen — Mikrofon tippen';
  } else if (phase === 'listening' && turn === 'de') {
    status.textContent = '● Deutsch aufnehmen — tippen zum Stoppen';
  } else if (phase === 'listening' && turn === 'it') {
    status.textContent = '● Italiano in ascolto — tocca per fermare';
  } else if (phase === 'translating') {
    status.textContent = 'Übersetze…';
  } else if (phase === 'speaking' && turn === 'de') {
    status.textContent = '🔊 Traduzione italiana in corso…';
  } else if (phase === 'speaking' && turn === 'it') {
    status.textContent = '🔊 Deutsche Übersetzung läuft…';
  }
}

function handleMicClick() {
  if (phase === 'translating') return;
  if (phase === 'speaking')   { stopSpeaking(); return; }
  if (phase === 'listening')  { stopListening(); return; }
  // idle: only manual start for German; Italian starts auto
  startListening(turn);
}

function startListening(lang) {
  finalTranscript = '';
  navigator.mediaDevices?.getUserMedia({ audio: true }).catch(() => {});
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Spracherkennung nicht unterstützt (Chrome/Edge nötig)'); return; }

  recognition = new SR();
  recognition.lang = lang === 'de' ? 'de-DE' : 'it-IT';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.maxAlternatives = 1;
  setUI('listening', lang);

  recognition.onresult = (e) => {
    finalTranscript = '';
    let interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    const preview = (finalTranscript + interim).trim();
    if (preview) {
      document.getElementById('status').textContent =
        (lang === 'de' ? '● ' : '● ') + preview.slice(0, 70) + (preview.length > 70 ? '…' : '');
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') alert('Mikrofon-Zugriff verweigert. Bitte Erlaubnis erteilen.');
    else console.warn('SR error:', e.error);
    setUI('idle');
  };

  recognition.onend = () => {
    if (phase !== 'listening') return;
    const text = finalTranscript.trim();
    if (text) translateAndSpeak(text, lang);
    else setUI('idle');
  };

  recognition.start();
}

function stopListening() { recognition?.stop(); }

function stopSpeaking() {
  window.speechSynthesis?.cancel();
  setUI('idle', 'de');
}

async function translateAndSpeak(text, fromLang) {
  setUI('translating');
  addBubble(fromLang, text);

  const src = fromLang === 'de' ? 'German'  : 'Italian';
  const tgt = fromLang === 'de' ? 'Italian' : 'German';
  const tgtCode = fromLang === 'de' ? 'it-IT' : 'de-DE';
  const key = localStorage.getItem('bl_api_key') || '';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        system: `You are a professional translator. Translate the given ${src} text to ${tgt}. Return ONLY the translation.`,
        messages: [{ role: 'user', content: text }],
      }),
    });
    const data = await res.json();
    if (data.error) { alert('API Fehler: ' + data.error.message); setUI('idle'); return; }
    const result = (data.content?.find(b => b.type === 'text')?.text || '').trim();
    addBubble(fromLang === 'de' ? 'it' : 'de', result);
    speakText(result, tgtCode, fromLang);
  } catch (e) {
    alert('Netzwerkfehler.');
    setUI('idle');
  }
}

function speakText(text, langCode, fromLang) {
  if (!window.speechSynthesis) { afterSpeaking(fromLang); return; }
  window.speechSynthesis.cancel();
  setUI('speaking', fromLang);
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = langCode; utt.rate = 0.92;
  utt.onend  = () => afterSpeaking(fromLang);
  utt.onerror = () => afterSpeaking(fromLang);
  window.speechSynthesis.speak(utt);
}

function afterSpeaking(fromLang) {
  if (fromLang === 'de') {
    // Italiano TTS fertig → automatisch Italienisch abhören
    setUI('idle', 'it');
    document.getElementById('status').textContent = 'Avvio microfono italiano…';
    setTimeout(() => startListening('it'), 700);
  } else {
    // Deutsch TTS fertig → warten auf deutschen Button
    setUI('idle', 'de');
  }
}

function addBubble(lang, text) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'bubble ' + lang;
  const flagDE = '<svg width="16" height="11" viewBox="0 0 16 11" style="border-radius:1px"><rect width="16" height="3.7" y="0" fill="#000"/><rect width="16" height="3.7" y="3.7" fill="#DD0000"/><rect width="16" height="3.7" y="7.3" fill="#FFCE00"/></svg>';
  const flagIT = '<svg width="16" height="11" viewBox="0 0 16 11" style="border-radius:1px"><rect width="5.3" height="11" x="0" fill="#009246"/><rect width="5.3" height="11" x="5.3" fill="#fff"/><rect width="5.3" height="11" x="10.7" fill="#CE2B37"/></svg>';
  const label = lang === 'de' ? flagDE + ' Deutsch' : flagIT + ' Italiano';
  div.innerHTML = '<div class="bubble-label">' + label + '</div><div>' + text + '</div>';
  log.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  document.getElementById('reset-btn').className = 'reset-btn show';
}

function resetAll() {
  window.speechSynthesis?.cancel();
  recognition?.stop();
  finalTranscript = '';
  document.getElementById('log').innerHTML = '';
  document.getElementById('reset-btn').className = 'reset-btn';
  setUI('idle', 'de');
}
</script>
</body>
</html>
